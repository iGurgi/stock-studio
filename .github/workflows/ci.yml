name: CI

# Runs on PRs (so branch protection can require it) and on pushes to main.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      # Confirms dependencies resolve against the committed lockfile.
      - name: Install dependencies
        run: npm ci

      # Parses every source file (no execution, no credentials needed).
      - name: Syntax check
        run: npm run check
