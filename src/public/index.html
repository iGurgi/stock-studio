<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stock Studio — desk console</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#0E1316; --panel:#151D22; --panel-2:#1B252B; --paper:#E9E7DF;
    --muted:#7E8A91; --gain:#4FB286; --loss:#D96C6C; --brass:#C9A24B;
    --line:rgba(233,231,223,.08); --line-strong:rgba(233,231,223,.16);
    --mono:"JetBrains Mono",ui-monospace,monospace;
    --disp:"Space Grotesk",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--ink);color:var(--paper);font-family:var(--disp);
    -webkit-font-smoothing:antialiased;line-height:1.45}
  a{color:var(--brass)}
  .wrap{max-width:1180px;margin:0 auto;padding:22px 20px 80px}

  /* ---- top status bar ---- */
  .bar{display:flex;flex-wrap:wrap;align-items:center;gap:18px 26px;
    border:1px solid var(--line);background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border-radius:14px;padding:16px 20px;margin-bottom:26px}
  .brand{display:flex;align-items:center;gap:11px;margin-right:auto}
  .brand h1{font-size:17px;font-weight:600;letter-spacing:.04em;margin:0}
  .brand small{display:block;color:var(--muted);font-size:11px;letter-spacing:.18em;text-transform:uppercase}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--gain);box-shadow:0 0 0 0 rgba(79,178,134,.5)}
  .dot.live{animation:pulse 2.4s infinite}
  .dot.halt{background:var(--loss)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(79,178,134,.45)}70%{box-shadow:0 0 0 7px rgba(79,178,134,0)}100%{box-shadow:0 0 0 0 rgba(79,178,134,0)}}
  @media (prefers-reduced-motion:reduce){.dot.live{animation:none}}

  .stat{display:flex;flex-direction:column;gap:2px}
  .stat .k{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  .stat .v{font-family:var(--mono);font-size:18px;font-weight:500}
  .v.gain{color:var(--gain)} .v.loss{color:var(--loss)}

  .halt-btn{font-family:var(--disp);font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    cursor:pointer;border-radius:9px;padding:9px 15px;border:1px solid var(--line-strong);
    background:transparent;color:var(--paper)}
  .halt-btn.on{background:var(--loss);border-color:var(--loss);color:#1a0d0d}
  .halt-btn.off{border-color:rgba(79,178,134,.4);color:var(--gain)}

  /* ---- section headers ---- */
  .eyebrow{display:flex;align-items:baseline;gap:12px;margin:34px 0 14px}
  .eyebrow h2{font-size:13px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;margin:0;color:var(--paper)}
  .eyebrow .meta{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .eyebrow .rule{flex:1;height:1px;background:var(--line)}

  /* ---- the approval gate (hero) ---- */
  .gate{display:grid;gap:16px}
  .ticket{position:relative;border:1px solid var(--line-strong);border-radius:14px;overflow:hidden;
    background:var(--panel);padding:20px 22px 20px 26px}
  .ticket::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--brass)}
  .ticket .row1{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  .side{font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:.06em;padding:3px 9px;border-radius:6px}
  .side.buy{color:var(--gain);background:rgba(79,178,134,.12)}
  .side.sell{color:var(--loss);background:rgba(217,108,108,.12)}
  .sym{font-family:var(--mono);font-size:22px;font-weight:700;letter-spacing:.02em}
  .spec{font-family:var(--mono);font-size:13px;color:var(--muted)}
  .pill{margin-left:auto;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--brass);
    border:1px solid rgba(201,162,75,.35);border-radius:20px;padding:4px 11px}
  .rationale{margin:13px 0 4px;color:#d6d4cc;font-size:14.5px;max-width:74ch}
  .sim{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:8px}
  .sim b{color:var(--paper);font-weight:500}
  .sim .warn{color:var(--brass)}

  .arm{display:flex;align-items:center;gap:10px;margin-top:16px;flex-wrap:wrap}
  .arm input{font-family:var(--mono);font-size:13px;background:var(--ink);color:var(--paper);
    border:1px solid var(--line-strong);border-radius:8px;padding:9px 11px;width:150px;letter-spacing:.08em}
  .arm input::placeholder{color:var(--muted);letter-spacing:.04em}
  .arm .placement-off{font-family:var(--mono);font-size:12px;color:var(--brass);letter-spacing:.02em;flex:1}
  .btn{font-family:var(--disp);font-weight:600;font-size:13px;cursor:pointer;border-radius:8px;padding:9px 16px;border:1px solid var(--line-strong);background:transparent;color:var(--paper)}
  .btn.approve{background:var(--brass);border-color:var(--brass);color:#1a1405}
  .btn.approve[disabled]{opacity:.4;cursor:not-allowed;background:transparent;color:var(--muted);border-color:var(--line)}
  .btn.reject{color:var(--muted)}
  .btn.reject:hover{color:var(--loss);border-color:rgba(217,108,108,.4)}

  .empty{border:1px dashed var(--line-strong);border-radius:14px;padding:34px;text-align:center;color:var(--muted)}
  .empty b{display:block;color:var(--paper);font-size:15px;margin-bottom:5px;letter-spacing:.02em}

  /* ---- grids ---- */
  .cols{display:grid;grid-template-columns:1.15fr .85fr;gap:26px}
  @media (max-width:820px){.cols{grid-template-columns:1fr}.bar{gap:14px 18px}}

  .card{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:6px 0}
  .card.scroll{max-height:420px;overflow-y:auto}
  .li{padding:12px 18px;border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:flex-start}
  .li:last-child{border-bottom:none}
  .li .lead{font-family:var(--mono);font-weight:600;font-size:13px;min-width:62px}
  .li .body{flex:1;font-size:13.5px;color:#cdcbc3}
  .li .when{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}
  .conv{font-family:var(--mono);font-size:11px;color:var(--brass)}
  .stance{font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:2px 7px;border-radius:5px}
  .stance.bull{color:var(--gain);background:rgba(79,178,134,.1)}
  .stance.bear{color:var(--loss);background:rgba(217,108,108,.1)}
  .stance.neutral{color:var(--muted);background:rgba(126,138,145,.12)}
  .lvl{width:7px;height:7px;border-radius:50%;margin-top:6px;flex:none;background:var(--muted)}
  .lvl.warn{background:var(--brass)} .lvl.alert{background:var(--loss)} .lvl.error{background:var(--loss)} .lvl.info{background:var(--muted)}

  /* ---- unlock ---- */
  .lock{display:flex;gap:8px;align-items:center}
  .lock input{font-family:var(--mono);font-size:12px;background:var(--ink);color:var(--paper);
    border:1px solid var(--line-strong);border-radius:8px;padding:8px 10px;width:170px}
  .locked-note{color:var(--brass);font-size:11px;letter-spacing:.04em}

  /* ---- credentials modal ---- */
  .bar .btn.creds{padding:8px 13px;font-size:12px;color:var(--muted)}
  .bar .btn.creds:hover{color:var(--paper);border-color:var(--line-strong)}
  .modal-overlay{position:fixed;inset:0;z-index:60;display:flex;align-items:flex-start;justify-content:center;
    padding:64px 18px;background:rgba(14,19,22,.72)}
  .modal-overlay[hidden]{display:none}
  .modal{width:100%;max-width:640px;background:var(--panel);border:1px solid var(--line-strong);
    border-radius:14px;box-shadow:0 24px 60px rgba(0,0,0,.5);overflow:hidden}
  .modal-head{display:flex;align-items:center;gap:12px;padding:15px 18px;border-bottom:1px solid var(--line)}
  .modal-head h2{font-size:13px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;margin:0}
  .modal-head .meta{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .modal-close{margin-left:auto;background:transparent;border:1px solid var(--line-strong);color:var(--muted);
    border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:14px;line-height:1}
  .modal-close:hover{color:var(--paper)}
  .modal .card{border:0;border-radius:0;background:transparent;padding:6px 12px 14px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel-2);
    border:1px solid var(--line-strong);border-radius:10px;padding:11px 14px 11px 18px;font-size:13px;
    display:flex;align-items:center;gap:14px;max-width:min(560px,92vw);
    opacity:0;transition:opacity .2s;pointer-events:none;z-index:9}
  .toast.show{opacity:1;pointer-events:auto}
  .toast #toastMsg{flex:1;line-height:1.4;word-break:break-word}
  .toast.error{border-color:rgba(217,108,108,.5);background:linear-gradient(180deg,#241a1a,var(--panel-2))}
  .toast.error #toastMsg{color:var(--loss)}
  .toast-x{display:none;background:transparent;border:0;color:var(--muted);cursor:pointer;font-size:13px;line-height:1;padding:2px 4px}
  .toast-x:hover{color:var(--paper)}
  .toast.error .toast-x{display:inline-block}
  .warnbar{border:1px solid rgba(201,162,75,.35);background:rgba(201,162,75,.07);color:var(--brass);
    border-radius:10px;padding:10px 14px;font-size:12.5px;margin-bottom:18px;font-family:var(--mono)}

  /* ---- credentials ---- */
  .set-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;padding:13px 18px;border-bottom:1px solid var(--line)}
  .set-row:last-child{border-bottom:none}
  .set-row label{min-width:160px;font-size:13px;color:#cdcbc3}
  .set-row input{flex:1;min-width:200px;font-family:var(--mono);font-size:13px;background:var(--ink);
    color:var(--paper);border:1px solid var(--line-strong);border-radius:8px;padding:9px 11px}
  .set-row input:disabled{opacity:.5;cursor:not-allowed}
  .set-row .status{font-family:var(--mono);font-size:11px;color:var(--muted);min-width:140px;text-align:right}
  .set-row .status.ok{color:var(--gain)}
  .set-actions{padding:13px 18px;display:flex;gap:12px;align-items:center}
  .set-actions .hint{font-size:11.5px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">

  <div class="bar">
    <div class="brand">
      <span id="dot" class="dot"></span>
      <div><h1>STOCK STUDIO</h1><small id="mode">desk console</small></div>
    </div>
    <div class="stat"><span class="k">Day P&amp;L</span><span id="pnl" class="v">—</span></div>
    <div class="stat"><span class="k">Buying power</span><span id="bp" class="v">—</span></div>
    <div class="stat"><span class="k">Equity value</span><span id="eq" class="v">—</span></div>
    <div class="stat"><span class="k">Proposals today</span><span id="cnt" class="v">—</span></div>
    <div class="lock" id="lock">
      <input id="tok" type="password" placeholder="control token" autocomplete="off" />
      <button class="btn" id="unlock">Unlock</button>
    </div>
    <button id="credsBtn" class="btn creds">Credentials</button>
    <button id="halt" class="halt-btn">—</button>
  </div>

  <div id="warns"></div>

  <div class="eyebrow">
    <h2>Awaiting your sign-off</h2><span class="rule"></span>
    <span class="meta" id="pendmeta"></span>
  </div>
  <div class="gate" id="gate"></div>

  <div class="eyebrow">
    <h2>Open orders</h2><span class="rule"></span>
    <span class="meta" id="openmeta"></span>
  </div>
  <div class="card" id="openorders"></div>

  <div class="cols">
    <div>
      <div class="eyebrow"><h2>Active theses</h2><span class="rule"></span></div>
      <div class="card scroll" id="theses"></div>
    </div>
    <div>
      <div class="eyebrow"><h2>Desk activity</h2><span class="rule"></span></div>
      <div class="card scroll" id="events"></div>
    </div>
  </div>

  <div class="eyebrow">
    <h2>Desk scorecard</h2><span class="rule"></span>
    <span class="meta" id="scoremeta"></span>
  </div>
  <div class="card" id="scorecard"></div>

  <div class="eyebrow">
    <h2>Realized P&amp;L</h2><span class="rule"></span>
    <span class="meta" id="pnlmeta"></span>
  </div>
  <div class="card" id="pnlCard"></div>

  <div class="eyebrow"><h2>Recent runs</h2><span class="rule"></span></div>
  <div class="card" id="runs"></div>

</div>

<div class="modal-overlay" id="credsModal" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-label="Credentials">
    <div class="modal-head">
      <h2>Credentials</h2>
      <span class="meta" id="setmeta"></span>
      <button class="modal-close" id="credsClose" aria-label="Close">✕</button>
    </div>
    <div class="card" id="settings"></div>
  </div>
</div>

<div class="toast" id="toast"><span id="toastMsg"></span><button class="toast-x" id="toastClose" aria-label="Dismiss">✕</button></div>

<script>
let TOKEN = sessionStorage.getItem('cs_token') || '';
let PLACEMENT_ON = false; // mirrors s.placementEnabled; gates the approve UI
const $ = (id) => document.getElementById(id);
const fmt = (n) => (n==null||isNaN(n)) ? '—' : '$'+Number(n).toLocaleString(undefined,{maximumFractionDigits:2});
const ago = (iso) => { if(!iso) return ''; const s=(Date.now()-new Date(iso))/1000;
  if(s<60) return Math.floor(s)+'s'; if(s<3600) return Math.floor(s/60)+'m';
  if(s<86400) return Math.floor(s/3600)+'h'; return Math.floor(s/86400)+'d'; };
const esc = (s) => String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

// Info/success toasts linger then fade; errors stay until dismissed (✕).
let toastTimer = null;
function toast(msg, type='info'){
  const t=$('toast');
  $('toastMsg').textContent = msg;
  t.className = 'toast show' + (type==='error' ? ' error' : '');
  clearTimeout(toastTimer);
  if(type !== 'error') toastTimer = setTimeout(()=>t.classList.remove('show'), 5000);
}

async function api(path){ const r=await fetch(path); return r.json(); }
async function post(path, body){
  const r=await fetch(path,{method:'POST',headers:{'content-type':'application/json','authorization':'Bearer '+TOKEN},body:JSON.stringify(body||{})});
  const j=await r.json().catch(()=>({})); if(!r.ok) throw new Error(j.error||('HTTP '+r.status)); return j;
}

function setLock(){
  $('lock').innerHTML = TOKEN
    ? '<span class="locked-note">● unlocked</span>'
    : '<input id="tok" type="password" placeholder="control token" autocomplete="off" /><button class="btn" id="unlock">Unlock</button>';
  if(!TOKEN){ $('unlock').onclick=()=>{ TOKEN=$('tok').value.trim(); if(TOKEN){sessionStorage.setItem('cs_token',TOKEN); setLock(); refresh();} }; }
}

async function refresh(){
  try{
    const s = await api('/api/state');
    PLACEMENT_ON = !!s.placementEnabled;
    $('dot').className = 'dot ' + (s.halted ? 'halt' : 'live');
    $('mode').textContent = s.halted ? 'HALTED · monitoring only'
      : (s.placementEnabled ? 'live · placement armed' : 'live · placement disabled');
    const pnl=$('pnl'); pnl.textContent = s.portfolio? fmt(s.portfolio.day_pnl_usd) : '—';
    pnl.className='v '+((s.portfolio?.day_pnl_usd||0)>=0?'gain':'loss');
    $('bp').textContent = fmt(s.portfolio?.portfolio?.buying_power);
    $('eq').textContent = fmt(s.portfolio?.portfolio?.equity_value);
    $('cnt').textContent = s.counts.proposalsToday + ' / ' + s.counts.maxPerDay;

    const halt=$('halt');
    halt.textContent = s.halted ? 'Resume desk' : 'HALT';
    halt.className = 'halt-btn ' + (s.halted?'off':'on');
    halt.onclick = async ()=>{ if(!TOKEN) return toast('unlock first');
      try{ await post('/api/halt',{halted:!s.halted}); refresh(); }catch(e){ toast(e.message, 'error'); } };

    $('warns').innerHTML = (s.configProblems&&s.configProblems.length)
      ? '<div class="warnbar">setup: '+s.configProblems.map(esc).join(' · ')+'</div>'
      : (!s.placementEnabled ? '<div class="warnbar">placement is disabled — approvals are blocked until PLACEMENT_ENABLED=true</div>' : '');

    renderSettings(await api('/api/settings'));
    renderGate(await api('/api/proposals?status=pending'));
    renderOpenOrders(await api('/api/proposals?status=placed'));
    renderTheses(await api('/api/theses'));
    renderEvents(await api('/api/events'));
    renderScorecard(await api('/api/scorecard'));
    renderPnl(await api('/api/pnl'));
    renderRuns(await api('/api/runs'));
  }catch(e){ console.error(e); }
}

const SECRET_FIELDS = [
  { key:'robinhoodMcpToken', label:'Robinhood MCP token', ph:'paste token' },
  { key:'robinhoodAccount',  label:'Robinhood account',   ph:'account number' },
  { key:'llmApiKey',         label:'LLM API key (opt)',   ph:'blank for Ollama' },
  { key:'searchApiKey',      label:'Search API key (opt)',ph:'Tavily/Brave key' },
  { key:'coinbaseApiKeyName',label:'Coinbase key name',   ph:'organizations/…/apiKeys/…' },
  { key:'coinbaseApiSecret', label:'Coinbase private key',ph:'PEM or base64 secret' },
];

function renderSettings(s){
  const sec = (s&&s.secrets) || {};
  // Don't clobber the panel while the operator is mid-edit: if any credential
  // input is focused or already has text, leave the existing DOM (and the typed
  // values) untouched until they save or clear it.
  const live = $('settings').querySelectorAll('[data-secret]');
  if(live.length){
    const busy = [...live].some(i => i===document.activeElement || i.value.trim()!=='');
    if(busy) return;
  }
  const allSet = SECRET_FIELDS.every(f => sec[f.key] && sec[f.key].set);
  $('setmeta').textContent = TOKEN ? (allSet?'all set':'unlocked') : 'unlock to edit';
  const rows = SECRET_FIELDS.map(f=>{
    const st = sec[f.key] || {};
    const status = st.set
      ? `<span class="status ok">● ${st.source==='env'?'from env':'saved'} ${esc(st.preview||'')}</span>`
      : `<span class="status">not set</span>`;
    return `<div class="set-row">
      <label>${esc(f.label)}</label>
      <input data-secret="${f.key}" type="password" autocomplete="off"
        placeholder="${esc(f.ph)}" ${TOKEN?'':'disabled'} />
      ${status}
    </div>`;
  }).join('');
  $('settings').innerHTML = rows + `<div class="set-actions">
    <button class="btn approve" id="saveSet" ${TOKEN?'':'disabled'}>Save credentials</button>
    <span class="hint">${TOKEN
      ? 'Stored on the server and kept across restarts. Leave a field blank to keep its current value.'
      : 'Enter the control token above to edit.'}</span>
  </div>`;

  if(TOKEN){
    $('saveSet').onclick = async ()=>{
      const body={};
      $('settings').querySelectorAll('[data-secret]').forEach(i=>{
        const v=i.value.trim(); if(v) body[i.dataset.secret]=v;
      });
      if(!Object.keys(body).length) return toast('nothing to save — fields are blank');
      const btn=$('saveSet'); btn.disabled=true; btn.textContent='Saving…';
      try{ const r=await post('/api/settings',body);
        toast('Saved · '+(r.changed||[]).join(', '));
        // clear inputs so the busy-guard releases and refresh shows new status
        $('settings').querySelectorAll('[data-secret]').forEach(i=>i.value='');
        refresh();
      }catch(e){ toast(e.message, 'error'); btn.disabled=false; btn.textContent='Save credentials'; }
    };
  }
}

function renderGate(rows){
  const g=$('gate');
  // Don't blow away a ticket the operator is mid-approval on: if any confirm
  // input is focused or already has typed text, leave the gate untouched until
  // they finish — approve/dismiss clears it and the next refresh redraws.
  const liveInputs = g.querySelectorAll('[data-confirm]');
  if(liveInputs.length){
    const busy = [...liveInputs].some(i => i===document.activeElement || i.value.trim()!=='');
    if(busy) return;
  }
  $('pendmeta').textContent = rows.length ? rows.length+' pending' : '';
  if(!rows.length){ g.innerHTML='<div class="empty"><b>The desk is clear.</b>No trades are waiting on you. The agent keeps researching and will surface a ticket here when it finds a setup worth your call.</div>'; return; }
  g.innerHTML = rows.map(p=>{
    const rv=p.review||{};
    const sim = rv.estimated_cost_usd!=null
      ? 'sim fill ~ <b>'+fmt(rv.estimated_cost_usd)+'</b>'+(rv.estimated_price?(' @ <b>'+rv.estimated_price+'</b>'):'')
      : 'sim ~ <b>'+fmt(p.est_cost_usd)+'</b>';
    const warns = (rv.warnings&&rv.warnings.length)? ' · <span class="warn">'+rv.warnings.map(esc).join(' · ')+'</span>':'';
    return `<div class="ticket" data-id="${p.id}" data-sym="${esc(p.symbol)}">
      <div class="row1">
        <span class="side ${p.side}">${p.side.toUpperCase()}</span>
        <span class="sym">${esc(p.symbol)}</span>
        <span class="spec">${p.qty} @ ${p.limit_price!=null?('$'+p.limit_price):p.order_type} · ${esc(p.time_in_force)} · ${esc(p.asset_type)}</span>
        <span class="pill">needs sign-off</span>
      </div>
      <div class="rationale">${esc(p.rationale_md)}</div>
      <div class="sim">${sim}${warns}</div>
      <div class="arm">
        ${PLACEMENT_ON
          ? `<input placeholder="type ${esc(p.symbol)}" data-confirm />
             <button class="btn approve" disabled data-approve>Approve &amp; place</button>`
          : `<span class="placement-off" title="Placement is disabled — set PLACEMENT_ENABLED=true to arm real orders">⚠ placement disabled — can't place orders</span>`}
        <button class="btn reject" data-reject>Dismiss</button>
      </div>
    </div>`;
  }).join('');

  g.querySelectorAll('.ticket').forEach(card=>{
    const id=card.dataset.id, sym=card.dataset.sym;
    const inp=card.querySelector('[data-confirm]'), ap=card.querySelector('[data-approve]');
    if(inp && ap){
      inp.oninput=()=>{ ap.disabled = inp.value.trim().toUpperCase()!==sym.toUpperCase(); };
      ap.onclick=async ()=>{ if(!TOKEN) return toast('unlock first');
        ap.disabled=true; ap.textContent='Placing…';
        try{ const r=await post('/api/proposals/'+id+'/approve',{confirm:inp.value.trim()});
          toast('Order placed · '+(r.order_id||'')); inp.value=''; refresh();
        }catch(e){ toast(e.message, 'error'); ap.disabled=false; ap.textContent='Approve & place'; } };
    }
    card.querySelector('[data-reject]').onclick=async ()=>{ if(!TOKEN) return toast('unlock first');
      try{ await post('/api/proposals/'+id+'/reject',{}); if(inp) inp.value=''; refresh(); }catch(e){ toast(e.message, 'error'); } };
  });
}

function renderOpenOrders(rows){
  $('openmeta').textContent = rows.length ? rows.length+' open' : '';
  const el=$('openorders');
  if(!rows.length){ el.innerHTML='<div class="li"><span class="body">No open orders.</span></div>'; return; }
  el.innerHTML = rows.map(p=>`<div class="li" data-id="${p.id}">
    <span class="lead"><span class="side ${p.side}">${esc(p.side.toUpperCase())}</span> ${esc(p.symbol)}</span>
    <span class="body">${p.qty} @ ${p.limit_price!=null?('$'+p.limit_price):esc(p.order_type)} · ${esc(p.time_in_force)} · order ${esc((p.placed_order_id||'—').slice(0,8))}</span>
    <button class="btn reject" data-cancel>Cancel order</button>
  </div>`).join('');
  el.querySelectorAll('[data-cancel]').forEach(btn=>{
    const id=btn.closest('.li').dataset.id;
    btn.onclick=async ()=>{ if(!TOKEN) return toast('unlock first');
      btn.disabled=true; btn.textContent='Canceling…';
      try{ await post('/api/proposals/'+id+'/cancel',{}); toast('Order canceled'); refresh(); }
      catch(e){ toast(e.message, 'error'); btn.disabled=false; btn.textContent='Cancel order'; } };
  });
}
function renderTheses(rows){
  $('theses').innerHTML = rows.length ? rows.map(t=>`<div class="li">
    <span class="lead">${esc(t.symbol)}</span>
    <span class="body"><span class="stance ${t.stance}">${esc(t.stance)}</span> <span class="conv">c${t.conviction}</span> — ${esc(t.thesis_md)}</span>
    <span class="when">${ago(t.updated_at)}</span></div>`).join('')
    : '<div class="li"><span class="body">No theses yet — the research pass will populate this.</span></div>';
}
function renderEvents(rows){
  $('events').innerHTML = rows.slice(0,40).map(e=>`<div class="li">
    <span class="lvl ${e.level}"></span>
    <span class="body">${esc(e.message)}</span>
    <span class="when">${ago(e.ts)}</span></div>`).join('') || '<div class="li"><span class="body">Quiet so far.</span></div>';
}
// Inline SVG sparkline — no chart library in this codebase, and a polyline
// over a handful of snapshot points doesn't need one.
function sparkline(points){
  if(points.length<2) return '';
  const w=640,h=80,pad=4;
  const vals=points.map(p=>p.account_value);
  const min=Math.min(...vals), max=Math.max(...vals);
  const span=(max-min)||1;
  const x=(i)=> pad + (w-2*pad) * i/(points.length-1);
  const y=(v)=> h-pad - (h-2*pad) * (v-min)/span;
  const d = points.map((p,i)=> (i===0?'M':'L')+x(i).toFixed(1)+','+y(p.account_value).toFixed(1)).join(' ');
  const up = vals[vals.length-1] >= vals[0];
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:80px;display:block" preserveAspectRatio="none">
    <path d="${d}" fill="none" stroke="${up?'var(--gain)':'var(--loss)'}" stroke-width="2" />
  </svg>`;
}
const pct = (n) => n==null ? '—' : Math.round(100*n)+'%';
function bucketRow(label, b){
  return `<div class="li">
    <span class="lead">${esc(label)}</span>
    <span class="body">${b.trades} trades · ${pct(b.win_rate)} win · ${b.avg_r!=null?Number(b.avg_r).toFixed(2)+'R avg':'— R avg'} · ${pct(b.hit_rate)} hit rate</span>
  </div>`;
}
function renderScorecard(d){
  const curve = (d && d.equityCurve) || [];
  const byConv = (d && d.byConviction) || [];
  const bySrc = (d && d.byDiscoverySource) || [];
  $('scoremeta').textContent = curve.length ? curve.length+' snapshots' : '';

  const curveHtml = curve.length>=2
    ? `<div class="li">${sparkline(curve)}</div>`
    : '<div class="li"><span class="body">Equity curve needs at least two portfolio snapshots — check back after a couple of tracking passes.</span></div>';

  const convHtml = byConv.length
    ? byConv.map(b=>bucketRow('Conviction '+b.bucket, b)).join('')
    : '<div class="li"><span class="body">No closed trades yet by conviction.</span></div>';

  const srcHtml = bySrc.length
    ? bySrc.map(b=>bucketRow(b.bucket==='watchlist'?'Watchlist/universe':b.bucket, b)).join('')
    : '<div class="li"><span class="body">No closed trades yet by discovery source.</span></div>';

  $('scorecard').innerHTML = curveHtml + convHtml + srcHtml;
}
function renderPnl(d){
  const trades = (d && d.trades) || [];
  const s = (d && d.summary) || {};
  $('pnlmeta').textContent = s.trades ? s.trades+' closed · win rate '+Math.round(100*(s.wins||0)/s.trades)+'%' : '';
  const el=$('pnlCard');
  if(!trades.length){ el.innerHTML='<div class="li"><span class="body">No closed trades yet — realized P&amp;L appears here once a position is exited.</span></div>'; return; }
  const header = `<div class="li">
    <span class="lead">Total</span>
    <span class="body"><span class="${(s.total_pnl||0)>=0?'v gain':'v loss'}" style="font-family:var(--mono);font-size:13px">${fmt(s.total_pnl)}</span>
      ${s.avg_r!=null?(' · avg '+Number(s.avg_r).toFixed(2)+'R'):''}</span></div>`;
  el.innerHTML = header + trades.map(t=>{
    const gain = t.realized_pnl_usd>=0;
    return `<div class="li">
      <span class="lead">${esc(t.symbol)}</span>
      <span class="body">${t.qty} @ ${t.entry_price} → ${t.exit_price}
        <span class="${gain?'v gain':'v loss'}" style="font-family:var(--mono);font-size:13px">${gain?'+':''}${fmt(t.realized_pnl_usd)}</span>
        ${t.realized_r!=null?(' ('+Number(t.realized_r).toFixed(2)+'R)'):''}
        ${t.thesis_md?(' — '+esc(t.thesis_md.slice(0,80))):''}</span>
      <span class="when">${ago(t.closed_at)}</span></div>`;
  }).join('');
}
function renderRuns(rows){
  $('runs').innerHTML = rows.slice(0,12).map(r=>`<div class="li">
    <span class="lead">${esc(r.kind)}</span>
    <span class="body">${r.status==='error'?('<span style="color:var(--loss)">error: '+esc(r.error||'')+'</span>'):esc(r.summary||r.status)}</span>
    <span class="when">${ago(r.started_at)}</span></div>`).join('') || '<div class="li"><span class="body">No runs yet.</span></div>';
}

// Toast dismiss (errors persist until clicked).
$('toastClose').onclick = () => { clearTimeout(toastTimer); $('toast').classList.remove('show'); };

// Credentials modal — opened from the top bar, dismissed by ✕, backdrop, or Esc.
const credsModal = $('credsModal');
const closeCreds = () => { credsModal.hidden = true; };
$('credsBtn').onclick = () => { credsModal.hidden = false; };
$('credsClose').onclick = closeCreds;
credsModal.onclick = (e) => { if (e.target === credsModal) closeCreds(); };
document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !credsModal.hidden) closeCreds(); });

setLock();
refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
